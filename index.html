<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Form Project</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form action="" class="contact-form">
      <div class="form-logo">
        <i class="fa-solid fa-envelope"></i>
      </div>

      <h1 class="form-title">Contact Form</h1>
      <p class="form-description">We'd love to hear from you.</p>

      <d class="input-group">
        <i class="fa-regular fa-user input-icon"></i>
        <input type="text"
          placeholder="Enter your full name"
          id="contact-name"
          onkeyup="NameValidate()"/>
         <span id="name-error"></span>
      </div>

      <!-- Phone Number -->
      <div class="input-group">
        <i class="fa-solid fa-phone input-icon"></i>
        <input type="tel" placeholder="Enter your phone number" />
        <span id="contact-error"></span>
      </div>

      <div class="input-group">
        <i class="fa-regular fa-envelope input-icon"></i>
        <input type="email" placeholder="Enter your email" />
        <span id="email-error"> </span>
      </div>

      <div class="message-group">
        <i class="fa-regular fa-comment input-icon"></i>
        <textarea placeholder="Enter your message"></textarea>
        <span id="message-error"></span>
      </div>

      <button type="submit" class="submit-btn">
        Send Message
        <i class="fa-solid fa-paper-plane"></i>
      </button>
      <span id="submit-error"></span>
    </form>
  </body>
  <script src="script.js"></script>
</html>
